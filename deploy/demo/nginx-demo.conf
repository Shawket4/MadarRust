# demo.madar-pos.cloud → static demo dashboard at /var/www/madar-demo
# (deployed by the dashboard CI). SPA fallback to index.html. This box uses
# sites-available + sites-enabled symlinks.
#
#   sudo cp nginx-demo.conf /etc/nginx/sites-available/demo.madar-pos.cloud
#   sudo ln -sf /etc/nginx/sites-available/demo.madar-pos.cloud /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#   sudo certbot --nginx -d demo.madar-pos.cloud   # after DNS resolves

server {
    listen 80;
    server_name demo.madar-pos.cloud;

    root /var/www/madar-demo;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }
}
