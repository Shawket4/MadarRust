# demo.madar-pos.cloud → static demo dashboard at /var/www/madar-demo
# (deployed by the dashboard CI). SPA fallback to index.html. Drop in
# /etc/nginx/conf.d/, then certbot.
#
#   sudo cp nginx-demo.conf /etc/nginx/conf.d/demo.madar-pos.cloud.conf
#   sudo nginx -t && sudo systemctl reload nginx
#   sudo certbot --nginx -d demo.madar-pos.cloud

server {
    listen 80;
    server_name demo.madar-pos.cloud;

    root /var/www/madar-demo;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }
}
