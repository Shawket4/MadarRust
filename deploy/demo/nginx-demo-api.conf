# demo-api.madar-pos.cloud → demo backend container on 127.0.0.1:8082.
# Mirrors the prod api vhost but on the demo port. Drop in
# /etc/nginx/conf.d/ (or sites-available + symlink), then certbot.
#
#   sudo cp nginx-demo-api.conf /etc/nginx/conf.d/demo-api.madar-pos.cloud.conf
#   sudo nginx -t && sudo systemctl reload nginx
#   sudo certbot --nginx -d demo-api.madar-pos.cloud

server {
    listen 80;
    server_name demo-api.madar-pos.cloud;

    # Uploads are disabled in DEMO_MODE, so no /api/uploads alias is needed.

    location / {
        proxy_pass http://127.0.0.1:8082;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }
}
