# demo-api.madar-pos.cloud → demo backend container on 127.0.0.1:8083.
# Mirrors the prod api vhost but on the demo port. This box uses
# sites-available + sites-enabled symlinks.
#
#   sudo cp nginx-demo-api.conf /etc/nginx/sites-available/demo-api.madar-pos.cloud
#   sudo ln -sf /etc/nginx/sites-available/demo-api.madar-pos.cloud /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#   sudo certbot --nginx -d demo-api.madar-pos.cloud   # after DNS resolves

server {
    listen 80;
    server_name demo-api.madar-pos.cloud;

    # Uploads are disabled in DEMO_MODE, so no /api/uploads alias is needed.

    location / {
        proxy_pass http://127.0.0.1:8083;
        # Keep-alive upstream like the prod api vhost. Without HTTP/1.1 + an empty
        # Connection header, nginx proxies as HTTP/1.0 and actix rejects the request
        # with "invalid Header provided" (400 before it reaches any handler).
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }
}
